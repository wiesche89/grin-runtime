global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: grin-exporter
    static_configs:
      - targets:
          - grin-exporter:9108

  - job_name: runtime-controller
    metrics_path: /metrics
    static_configs:
      - targets:
          - runtime-controller:8080

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
