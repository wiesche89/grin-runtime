groups:
  - name: grin-runtime
    rules:
      - alert: GrinNodeUnreachable
        expr: min by (node_id,node_name) (grin_node_up) == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Grin node API is unreachable
      - alert: GrinPeerCountZero
        expr: max by (node_id,node_name) (grin_node_connections) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Grin node has no connected peers
      - alert: GrinContainerStopped
        expr: grin_runtime_node_observation{metric="container_running"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Runtime reports a stopped node container
      - alert: GrinHighCpu
        expr: grin_runtime_node_observation{metric="cpu_percent"} > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Node CPU usage is high
      - alert: GrinHighHostRam
        expr: 100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Host RAM usage is high
      - alert: GrinHighDiskUsage
        expr: 100 * (1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"})) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Host disk usage is high
      - alert: GrinAutosyncFailure
        expr: grin_runtime_autosync_enabled == 1 and on (node_id) grin_runtime_failure_state{failure_state!="ok"} == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Autosync node has a failure state
