services:
  grin-gw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GRIN_REPO: ${GRIN_REPO:-https://github.com/wiesche89/grin.git}
        GRIN_BRANCH: ${GRIN_BRANCH:-staging}
    image: grin-runtime:staging
    command: ["--testnet", "server", "-c", "/root/.grin/test/grin-server.toml", "run"]
    volumes:
      - ./nodes/gw:/root/.grin/test
    networks:
      public:
      cluster:
        aliases:
          - grin-gw
    ports:
      - "23414:23414"
      - "13413:13413"

  grin-node-1:
    image: grin-runtime:staging
    depends_on:
      - grin-gw
    command: ["--testnet", "server", "-c", "/root/.grin/test/grin-server.toml", "run"]
    volumes:
      - ./nodes/node-1:/root/.grin/test
    networks:
      cluster:
        aliases:
          - grin-node-1

  grin-node-2:
    image: grin-runtime:staging
    depends_on:
      - grin-gw
    command: ["--testnet", "server", "-c", "/root/.grin/test/grin-server.toml", "run"]
    volumes:
      - ./nodes/node-2:/root/.grin/test
    networks:
      cluster:
        aliases:
          - grin-node-2

  grinpp-node-1:
    build:
      context: .
      dockerfile: Dockerfile.grinpp
      args:
        GRINPP_REPO: ${GRINPP_REPO:-https://github.com/wiesche89/grinplusplus.git}
        GRINPP_REF: ${GRINPP_REF:-master}
    image: grin-runtime-grinpp:master
    depends_on:
      - grin-gw
    command: ["--public-node-api", "--floonet"]
    volumes:
      - ./nodes/grinpp-node-1:/root/.GrinPP
    networks:
      cluster:
        aliases:
          - grinpp-node-1

  monitor:
    image: python:3.12-alpine
    depends_on:
      - grin-gw
      - grin-node-1
      - grin-node-2
      - grinpp-node-1
    working_dir: /monitor
    command: ["python", "monitor_v2.py"]
    environment:
      GRIN_API_SECRET: "node-test-owner-secret"
      GRIN_NODE_SECRETS: "grinpp-node-1="
      GRIN_NODES: "grin-gw=http://grin-gw:13413,grin-node-1=http://grin-node-1:13413,grin-node-2=http://grin-node-2:13413,grinpp-node-1=http://grinpp-node-1:13413"
      GRIN_INTERNAL_NODES: "grin-node-1,grin-node-2,grinpp-node-1"
      GRIN_LOG_FILES: "grin-gw=/nodes/gw/grin-server.log,grin-node-1=/nodes/node-1/grin-server.log,grin-node-2=/nodes/node-2/grin-server.log,grinpp-node-1=/nodes/grinpp-node-1/FLOONET/LOGS/Node.log"
      GRIN_HEIGHT_LAG_WARN: "2"
      GRIN_POLL_SECS: "15"
    volumes:
      - ./monitor:/monitor:ro
      - ./nodes:/nodes:ro
    networks:
      cluster:

  grin-exporter:
    build:
      context: ./exporter
      dockerfile: Dockerfile
    image: grin-runtime-exporter:local
    depends_on:
      - grin-gw
      - grin-node-1
      - grin-node-2
      - grinpp-node-1
    environment:
      GRIN_API_SECRET: "node-test-owner-secret"
      GRIN_NODE_SECRETS: "grinpp-node-1="
      GRIN_NODES: "grin-gw=http://grin-gw:13413,grin-node-1=http://grin-node-1:13413,grin-node-2=http://grin-node-2:13413,grinpp-node-1=http://grinpp-node-1:13413"
      GRIN_EXPORTER_POLL_SECS: "10"
      GRIN_EXPORTER_PORT: "9108"
    networks:
      cluster:
      public:
    ports:
      - target: 9108
        published: 9108
        protocol: tcp
        host_ip: 0.0.0.0

  prometheus:
    image: prom/prometheus:v2.54.1
    depends_on:
      - grin-exporter
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      cluster:
      public:
    ports:
      - target: 9090
        published: 9090
        protocol: tcp
        host_ip: 0.0.0.0

  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      cluster:
      public:
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        host_ip: 0.0.0.0

networks:
  public:
  cluster:
    internal: true

volumes:
  prometheus-data:
  grafana-data:



